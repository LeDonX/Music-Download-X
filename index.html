<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Download X</title>
  <meta name="description" content="纯前端高品质音乐搜索与下载工具。">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>

  <!-- Liquid Animated Background Orbs -->
  <div class="liquid-bg">
    <div class="liquid-orb-1"></div>
    <div class="liquid-orb-2"></div>
    <div class="liquid-orb-3"></div>
  </div>



  <!-- Toast Notification Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- App Dashboard Grid -->
  <div class="app-container">
    
    <!-- Left Main Search Section -->
    <main class="search-pane">
      
      <!-- Floating Bottom Search Card -->
      <section class="glass-panel search-header-card">
        <div class="search-bar-inner">
          <div class="custom-select" id="customSelect">
            <div class="custom-select-trigger">
              <span id="selectedPlatform">QQ</span>
              <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
            <div class="custom-options-container" id="customOptions">
              <div class="custom-option active" data-value="tx">QQ</div>
              <div class="custom-option" data-value="wy">网易</div>
              <div class="custom-option" data-value="kg">酷狗</div>
              <div class="custom-option" data-value="kw">酷我</div>
              <div class="custom-option" data-value="mg">咪咕</div>
            </div>
          </div>
          <input type="text" id="searchInput" class="search-input" placeholder="输入歌名、歌手进行搜索..." autocomplete="off">
          <button id="searchBtn" class="search-btn">搜索</button>
        </div>
      </section>

      <!-- Search Results Card -->
      <section class="glass-panel results-card">
        <div class="section-title">
          搜索结果
          <span id="resultsCount">共 0 首歌曲</span>
        </div>
        
        <!-- Results Container -->
        <div id="songList" class="song-list">
          <!-- Welcome empty state -->
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <p>探索你喜爱的海量高品质音乐</p>
            <p style="font-size: 0.8rem; opacity: 0.8;">输入关键词并选择平台以开始搜索</p>
          </div>
        </div>
        <div id="scrollAnchor" style="height: 1px; width: 100%;"></div>

      </section>
    </main>

    <!-- Hidden Control & Queue Panels (Kept in DOM for script compat) -->
    <div style="display: none;">
      <aside class="sidebar-pane">
        
        <!-- Custom Source Script Manager Card -->
        <section class="glass-panel sidebar-card">
          <h2 class="card-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16.5 9.4 7.55 4.24a1.79 1.79 0 0 0-2.5 1.55v12.42a1.79 1.79 0 0 0 2.5 1.55l8.96-5.17a1.78 1.78 0 0 0 0-3.1z"/>
            </svg>
            解析服务设置
          </h2>
          <div class="source-status">
            <div id="sourceStatusDot" class="status-dot"></div>
            <span id="sourceStatusText" class="source-status-text">正在加载解析服务...</span>
          </div>
          <div class="script-input-wrapper">
            <input type="text" id="scriptInput" class="script-input" placeholder="输入解析脚本链接...">
            <div class="source-presets">
              <span class="preset-label">推荐预设:</span>
              <button class="preset-btn" data-url="https://fastly.jsdelivr.net/gh/pdone/lx-music-source@main/lx/latest.js">默认解析服务</button>
            </div>
            <button id="saveScriptBtn" class="save-script-btn">重载/初始化解析服务</button>
          </div>
        </section>

        <!-- Download Task Manager Card -->
        <section class="glass-panel sidebar-card" style="flex: 1; display: flex; flex-direction: column;">
          <h2 class="card-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            下载任务管理
          </h2>
          <div id="queueList" class="queue-list">
            <div class="empty-state" style="padding: 20px 0;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
              </svg>
              <p>暂无下载任务</p>
            </div>
          </div>
        </section>
      </aside>
    </div>
  </div>

  <!-- Quality Audio Download Modal Selector -->
  <div id="qualityModal" class="modal-overlay">
    <div class="glass-panel modal-content">
      <h3 class="modal-title">选择下载音质</h3>
      <div id="modalSongName" class="modal-song-name">歌曲名称</div>
      
      <div class="quality-options">
        <button class="quality-btn highest" data-quality="flac24bit">
          <div class="quality-label">
            <span class="quality-name">Hi-Res 无损</span>
            <span class="quality-tag">最高音质</span>
          </div>
          <span class="quality-size">约 25 MB</span>
        </button>
        <button class="quality-btn" data-quality="flac">
          <div class="quality-label">
            <span class="quality-name">无损 FLAC</span>
          </div>
          <span class="quality-size">约 10 MB</span>
        </button>
        <button class="quality-btn" data-quality="320k">
          <div class="quality-label">
            <span class="quality-name">极高 320kbps</span>
          </div>
          <span class="quality-size">约 3.0 MB</span>
        </button>
        <button class="quality-btn" data-quality="128k">
          <div class="quality-label">
            <span class="quality-name">标准 128kbps</span>
          </div>
          <span class="quality-size">约 1.2 MB</span>
        </button>
      </div>
      
      <button id="modalCloseBtn" class="modal-close-btn">取消</button>
    </div>
  </div>

  <!-- JS Modules -->
  <script type="module" src="/src/app.js"></script>
</body>
</html>
