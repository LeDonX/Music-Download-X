<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#FFFFFF"/>
  <!-- Decorative Ring -->
  <rect x="16" y="16" width="480" height="480" rx="104" stroke="#F3F4F6" stroke-width="4"/>

  <!-- Icon Group -->
  <g transform="translate(12, 12)">
    <!-- Diagonal 1: Music note stroke -->
    <path d="M 170 170 L 320 320" stroke="url(#concept3_gradient)" stroke-width="24" stroke-linecap="round"/>
    
    <!-- Note Head -->
    <circle cx="342" cy="342" r="32" fill="url(#concept3_gradient)"/>
    
    <!-- Note Flag -->
    <path d="M 170 170 C 220 170, 240 190, 240 230" stroke="url(#concept3_gradient)" stroke-width="20" stroke-linecap="round" fill="none"/>

    <!-- Diagonal 2: Download & Share stroke (broken into two segments for 3D overlap) -->
    <path d="M 342 170 L 286 226" stroke="url(#concept3_gradient)" stroke-width="24" stroke-linecap="round"/>
    <path d="M 226 286 L 180 332" stroke="url(#concept3_gradient)" stroke-width="24" stroke-linecap="round"/>
    
    <!-- Arrowhead at bottom-left -->
    <path d="M 220 342 L 170 342 L 170 292" stroke="url(#concept3_gradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Share Node -->
    <circle cx="342" cy="170" r="28" fill="url(#concept3_gradient)"/>
    <circle cx="342" cy="170" r="12" fill="#FFFFFF"/>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="concept3_gradient" x1="170" y1="170" x2="342" y2="342" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4B5563"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
  </defs>
</svg>
