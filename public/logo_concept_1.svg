<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#FFFFFF"/>
  <!-- Decorative Ring -->
  <rect x="16" y="16" width="480" height="480" rx="104" stroke="#F3F4F6" stroke-width="4"/>
  
  <!-- Icon Group -->
  <g transform="translate(12, 12)">
    <!-- Note Head -->
    <circle cx="180" cy="330" r="54" fill="url(#concept1_gradient)"/>
    
    <!-- Stem and Flowing Flag/Arrow -->
    <path d="M 234 330 V 170 C 234 110, 350 110, 350 200 V 310" stroke="url(#concept1_gradient)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Arrowhead -->
    <path d="M 290 270 L 350 330 L 410 270" stroke="url(#concept1_gradient)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Sharing Ripple -->
    <path d="M 180 330 A 84 84 0 0 1 110 260" stroke="#E5E7EB" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M 180 330 A 120 120 0 0 1 80 230" stroke="#F3F4F6" stroke-width="12" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="concept1_gradient" x1="180" y1="110" x2="350" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
</svg>
