<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="120" fill="#FFFFFF"/>
  <rect x="16" y="16" width="480" height="480" rx="104" stroke="#F3F4F6" stroke-width="4"/>

  <!-- Subtle shadow for 3D depth -->
  <filter id="shadow" x="100" y="80" width="300" height="320" filterUnits="userSpaceOnUse">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
  </filter>

  <g filter="url(#shadow)">
    <!-- Note Head -->
    <ellipse cx="195" cy="335" rx="52" ry="38" transform="rotate(-30, 195, 335)" fill="#1F2937"/>

    <!-- Stem and Flag -->
    <g stroke="#1F2937" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 232 140 V 335" fill="none"/>
      <path d="M 232 140 C 290 140, 320 170, 320 220" fill="none"/>
    </g>
  </g>
</svg>
