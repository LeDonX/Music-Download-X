<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="120" fill="#FFFFFF"/>
  <rect x="16" y="16" width="480" height="480" rx="104" stroke="#F3F4F6" stroke-width="4"/>

  <!-- Note Head -->
  <ellipse cx="195" cy="335" rx="52" ry="38" transform="rotate(-30, 195, 335)" fill="url(#note_gradient)"/>

  <!-- Stem and Flag -->
