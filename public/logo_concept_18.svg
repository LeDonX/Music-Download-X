    <path d="M 232 140 V 335" fill="none"/>
    <path d="M 232 140 C 290 140, 320 170, 320 220" fill="none"/>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="note_gradient" x1="195" y1="140" x2="320" y2="335" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4B5563"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
