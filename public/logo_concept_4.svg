<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#FFFFFF"/>
  
  <!-- Main Vinyl Shape -->
  <g>
    <!-- Vinyl Disc (Dark Gradient) -->
    <circle cx="256" cy="270" r="140" fill="url(#vinyl_grad)"/>
    
    <!-- Concentric Grooves -->
    <circle cx="256" cy="270" r="110" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.15"/>
    <circle cx="256" cy="270" r="80" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.15"/>
    <circle cx="256" cy="270" r="50" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.15"/>
    
    <!-- Center Label -->
    <circle cx="256" cy="270" r="24" fill="#FFFFFF" fill-opacity="0.9"/>
    <circle cx="256" cy="270" r="8" fill="#111827"/>

    <!-- Apple Bite -->
    <circle cx="366" cy="270" r="65" fill="#FFFFFF"/>
    
    <!-- Leaf -->
    <path d="M 256 115 C 275 95, 295 90, 295 90 C 295 90, 280 115, 256 115" fill="url(#vinyl_grad)"/>
  </g>

  <defs>
    <linearGradient id="vinyl_grad" x1="116" y1="130" x2="396" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
</svg>
