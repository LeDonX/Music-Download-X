<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="120" fill="#FFFFFF"/>
  <g stroke="url(#wave_grad)" stroke-width="16" stroke-linecap="round">
    <!-- Soundwave bars outlining the apple -->
    <line x1="160" y1="230" x2="160" y2="310"/>
    <line x1="184" y1="190" x2="184" y2="350"/>
    <line x1="208" y1="170" x2="208" y2="370"/>
    <line x1="232" y1="160" x2="232" y2="380"/>
    <line x1="256" y1="185" x2="256" y2="365"/> <!-- Apple center dip -->
    <line x1="280" y1="160" x2="280" y2="380"/>
    
    <!-- Bite side (shorter bars or offset) -->
    <line x1="304" y1="180" x2="304" y2="225"/>
    <line x1="304" y1="315" x2="304" y2="360"/> <!-- Bite split! -->
    
    <line x1="328" y1="195" x2="328" y2="215"/>
    <line x1="328" y1="325" x2="328" y2="345"/>
    
    <line x1="352" y1="240" x2="352" y2="300"/>
  </g>
  
  <!-- Apple Leaf -->
  <path d="M 256 125 C 275 105, 295 100, 295 100 C 295 100, 280 125, 256 125" fill="url(#wave_grad)"/>

  <defs>
    <linearGradient id="wave_grad" x1="160" y1="160" x2="352" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
</svg>
