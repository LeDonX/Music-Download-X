<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>下载歌曲 - Music Download X</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="download-page-body">
  <main class="download-page">
    <section class="glass-panel download-page-card">
      <div class="download-page-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
        </svg>
      </div>
      <h1 class="download-page-title">准备下载</h1>
      <div id="downloadFilename" class="download-page-filename">歌曲文件</div>
      <button id="startDownloadBtn" class="download-page-btn" type="button">开始下载</button>
      <p id="downloadHint" class="download-page-hint">点击后如果出现系统下载确认，请选择下载。后续进度请在浏览器下载列表或系统状态中查看。</p>
      <button id="homeBtn" class="download-page-link-btn" type="button">回到首页</button>
    </section>
  </main>
  <script type="module" src="/src/download.js"></script>
</body>
</html>
